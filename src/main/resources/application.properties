spring.application.name=bolsaDeEmpleo

spring.datasource.url=jdbc:mysql://localhost:3306/bolsa_empleo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Evita LazyInitializationException al acceder a relaciones en las vistas Thymeleaf
spring.jpa.open-in-view=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Carpeta relativa al directorio donde se ejecuta la aplicacion
cv.upload.dir=uploads/cv

# Tiempo de inactividad antes de expirar la sesion (en segundos): 30 minutos
server.servlet.session.timeout=1800
