spring.application.name=bolsaDeEmpleo

spring.datasource.url=jdbc:mysql://localhost:3306/bolsa_empleo?useSSL=false&serverTimezone=America/Costa_Rica
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Tamańo máximo del archivo individual: 5 MB
spring.servlet.multipart.max-file-size=5MB
# Tamańo máximo de la petición completa: 10 MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Ruta relativa al directorio de ejecución. Cambiar a ruta absoluta en producción.
# Ej. Linux/Mac: cv.upload.dir=/var/uploads/cv
# Ej. Windows:   cv.upload.dir=C:/uploads/cv
cv.upload.dir=uploads/cv

spring.thymeleaf.cache=false