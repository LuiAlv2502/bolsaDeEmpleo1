<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Oferente - Bolsa de Empleo</title>
  <link rel="stylesheet" th:href="@{/css/index.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<header>
  <h1>Bolsa de Empleo</h1>
  <nav>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/empresa/login}">Empresa</a>
    <a th:href="@{/oferente/login}">Oferente</a>
    <a th:href="@{/admin/login}">Administrador</a>
  </nav>
</header>

<main class="auth-main">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Acceso Oferente</h2>
      <p>Ingresa con tu correo y contraseña</p>
    </div>

    <div th:if="${error}" class="alert alert-error">
      <span th:text="${error}">Error de autenticación</span>
    </div>

    <form class="auth-form" th:action="@{/oferente/login}" method="post">
      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="tu@correo.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">Ingresar</button>
    </form>

    <div class="auth-footer">
      <p>¿No tienes cuenta? <a th:href="@{/oferente/registro}">Registrarse</a></p>
      <p><a th:href="@{/}">← Volver al inicio</a></p>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2025 Bolsa de Empleo. Todos los derechos reservados.</p>
</footer>

</body>
</html>
