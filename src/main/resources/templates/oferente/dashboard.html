<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Oferente - Bolsa de Empleo</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<header>
    <h1>Bolsa de Empleo</h1>
    <nav>
        <a th:href="@{/}">Inicio</a>
        <span>Bienvenido, <strong th:text="${nombre}">Oferente</strong></span>
        <a th:href="@{/oferente/logout}">Cerrar sesión</a>
    </nav>
</header>

<main class="auth-main">
    <div class="auth-card auth-card-wide">
        <div class="auth-header">
            <h2>Mi Panel</h2>
            <p>Gestioná tu perfil y habilidades</p>
        </div>

        <div class="registro-section" style="margin-top: 0;">
            <div class="registro-card">
                <h3>Mis Habilidades</h3>
                <p>Agregá o actualizá tus habilidades y niveles.</p>
                <a href="#" class="btn btn-secondary">Gestionar habilidades</a>
            </div>
            <div class="registro-card">
                <h3>Mi CV</h3>
                <p>Subí tu currículum en formato PDF.</p>
                <a href="#" class="btn btn-primary">Subir CV</a>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2025 Bolsa de Empleo. Todos los derechos reservados.</p>
</footer>

</body>
</html>
