<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Bolsa de Empleo</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<header>
    <h1>Bolsa de Empleo</h1>
    <nav>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/oferente/dashboard}">Dashboard</a>
        <span>Bienvenido, <strong th:text="${session.oferenteNombre}">Oferente</strong></span>
        <a th:href="@{/logout}" class="logout-link">Cerrar sesión</a>
    </nav>
</header>

<main class="auth-main">
    <div class="auth-card auth-card-wide">
        <div class="auth-header">
            <h2>Mi Perfil</h2>
            <p>Actualice tus datos personales y de contacto.</p>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
<form class="auth-form" th:action="@{/oferente/perfil}" method="post"
      th:object="${oferente}">

    <div class="form-row">
        <div class="form-group">
            <label>Identificación</label>
            <input type="text" th:value="*{identificacion}" disabled style="background:#f5f5f5; color:#888888;">
        </div>
        <div class="form-group">
            <label for="nacionalidad">Nacionalidad</label>
            <input type="text" id="nacionalidad" name="nacionalidad"
                   th:field="*{nacionalidad}" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre"
                   th:field="*{nombre}" required>
        </div>
        <div class="form-group">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido"
                   th:field="*{apellido}" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo"
                   th:field="*{correo}" required>
        </div>
        <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono"
                   th:field="*{telefono}">
        </div>
    </div>

    <div class="form-group">
        <label for="residencia">Lugar de residencia</label>
        <input type="text" id="residencia" name="residencia"
               th:field="*{residencia}">
    </div>

    <div class="auth-footer">
        <p>
            <a th:href="@{/oferente/dashboard}">← Volver al panel</a>
            <a th:href="@{/oferente/cv}">Mi CV</a>
        </p>
    </div>

    <button type="submit" class="btn-submit">Guardar cambios</button>
</form>
        <div class="auth-footer">
            <p>
                <a th:href="@{/oferente/dashboard}">← Volver al panel</a>
                <a th:href="@{/oferente/cv}">Mi CV</a>
            </p>
        </div>
    </div>
</main>
<footer>
    <p> 206 Bolsa de Empleo. Todos los derechos reservados.</p>
</footer>
</body>
</html>
