<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Bolsa de Empleo</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<header>
    <h1> Bolsa de Empleo </h1>
    <nav>
        <a th:ref="@{/}">Inicio</a>
        <a th:ref="@{/login}" class="nav-active">Iniciar Sesión</a>
        <a th:ref="@{/empresa/registro}">Registrar Empresar</a>
        <a th:ref="@{/oferente/registro}">Registrar Oferente</a>
    </nav>
</header>

<main class="auth-main">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Iniciar Sesión</h2>
            <p>Ingresa tus credenciales para entrar</p>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}">Error de Inicio de Sesión</span>
        </div>
        <form class="auth-form" th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="credencial"> Correo electrónico o identificación </label>
                <input type="text" id="credencial" name="credencial" placeholder="tu@correo.com o número de identificación" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password"> Contraseña </label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit"> Ingresar </button>
        </form>

        <div class="auth-footer">
            <p>¿No tiene cuenta? <a th:href="@{/empresa/registro}">Registrar empresa</a>
            <a th:href="@{/oferente/registro}"> Registrarse como Oferente</a>
            </p>
            <p> <a th:href="@{/}"> ← Volver al inicio </a></p>
        </div>
    </div>
</main>

<footer>
    <p>2026 Bolsa de Empleo. Todos los derechos reservaods.</p>
</footer>
</body>
</html>
