<!DOCTYPE html>
<html lang="en" xmlns:th = "http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
    <title>Dashboard Empresa - Bolsa de Empleo</title>
    <link th:href="@{/css/index.css}" rel="stylesheet"/>
    <link th:href="@{/css/auth.css}" rel="stylesheet"/>
</head>
<body>
<header>
  <h1>Bolsa de Empleo</h1>
  <nav>
    <a th:href="@{/}">Inicio</a>
    <span>Bienvenido, <strong th:text="${nombre}">Empresa</strong></span>
    <a th:href="@{/logout}">Cerrar Sesión</a>
  </nav>
</header>
<main class="auth-main">
  <div class="auth-card auth-card-wide">
    <div class="auth-header">
    <h2>Panel de Empresa</h2>
    <p>Gestioná tus puestos y candidatos</p>
  </div>

  <div class="registro-section" style="margin-top: 0;">
    <div class="registro-card">
      <h3>Mis Puestos</h3>
      <p>Publicá nuevos puestos y gestioná los existentes</p>
      <a href="/empresa/puesto" class="btn btn-secondary">Ver puestos</a>

    </div>
  </div>
  </div>

</main>
<footer>
  <p>2026 Bolsa de Empleo. Todos los derechos reservados.</p>
</footer>
</body>
</html>
